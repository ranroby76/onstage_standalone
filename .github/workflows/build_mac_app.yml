name: Build macOS App

on:
  push:
    branches: [ main, master, ranroby76/supabase ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_mac_app:
    name: Build macOS Standalone
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: |
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git JUCE
          echo "JUCE cloned to $(pwd)/JUCE"

      - name: Install Dependencies
        run: brew install ninja cmake

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_PATH="${{ github.workspace }}/JUCE" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build App
        run: cmake --build build --config Release --parallel 4

      - name: List Build Output
        run: |
          echo "=== Build directory structure ==="
          find build -name "*.app" -type d 2>/dev/null || echo "No .app found"
          find build -name "Colosseum*" -type d 2>/dev/null || echo "No Colosseum dir found"
          ls -la build/ || true
          ls -la build/SubterraneumApp_artefacts/Release/ 2>/dev/null || true

      - name: Package App
        run: |
          # Locate App (JUCE output structure)
          if [ -d "build/SubterraneumApp_artefacts/Release/Colosseum.app" ]; then
            APP_PATH="build/SubterraneumApp_artefacts/Release/Colosseum.app"
          elif [ -d "build/Colosseum.app" ]; then
            APP_PATH="build/Colosseum.app"
          elif [ -d "build/Release/Colosseum.app" ]; then
            APP_PATH="build/Release/Colosseum.app"
          else
            echo "::error::Colosseum.app not found!"
            find build -name "*.app" -type d
            exit 1
          fi
          
          echo "Packaging app from $APP_PATH"
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "Colosseum_Mac.zip"

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: Colosseum-Mac-App
          path: Colosseum_Mac.zip