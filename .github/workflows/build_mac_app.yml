name: Build macOS App

on:
  push:
    branches: [ main, master, ranroby76/supabase ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_mac_app:
    name: Build macOS Standalone
    runs-on: macos-latest
    
    env:
      SIGNING_ENABLED: ${{ secrets.MACOS_CERTIFICATE }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: |
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git JUCE
          echo "JUCE cloned to $(pwd)/JUCE"

      - name: Install Dependencies
        run: brew install ninja cmake

      - name: Create macOS Icon
        run: |
          mkdir -p assets
          
          # Check if .icns already exists
          if [ -f "assets/Colosseum.icns" ]; then
            echo "macOS icon already exists"
            exit 0
          fi
          
          # Find source image: try .ico first, then .png
          SOURCE_IMG=""
          if [ -f "icon.ico" ]; then
            echo "Found icon.ico - converting to PNG first..."
            # Use sips to convert .ico to .png (sips handles .ico on macOS)
            sips -s format png icon.ico --out /tmp/icon_source.png 2>/dev/null
            if [ $? -ne 0 ]; then
              # If sips fails with .ico, try magick/convert
              if command -v magick &> /dev/null; then
                magick icon.ico[0] /tmp/icon_source.png
              elif command -v convert &> /dev/null; then
                convert icon.ico[0] /tmp/icon_source.png
              else
                echo "Installing ImageMagick for .ico conversion..."
                brew install imagemagick
                magick icon.ico[0] /tmp/icon_source.png
              fi
            fi
            SOURCE_IMG="/tmp/icon_source.png"
          elif [ -f "assets/colosseum_logo.png" ]; then
            SOURCE_IMG="assets/colosseum_logo.png"
          fi
          
          if [ -z "$SOURCE_IMG" ] || [ ! -f "$SOURCE_IMG" ]; then
            echo "No source image found for icon (tried icon.ico, assets/colosseum_logo.png)"
            exit 0
          fi
          
          echo "Converting $SOURCE_IMG to ICNS..."
          mkdir -p Icon.iconset
          
          # Create all required icon sizes
          sips -z 16 16     "$SOURCE_IMG" --out Icon.iconset/icon_16x16.png
          sips -z 32 32     "$SOURCE_IMG" --out Icon.iconset/icon_16x16@2x.png
          sips -z 32 32     "$SOURCE_IMG" --out Icon.iconset/icon_32x32.png
          sips -z 64 64     "$SOURCE_IMG" --out Icon.iconset/icon_32x32@2x.png
          sips -z 128 128   "$SOURCE_IMG" --out Icon.iconset/icon_128x128.png
          sips -z 256 256   "$SOURCE_IMG" --out Icon.iconset/icon_128x128@2x.png
          sips -z 256 256   "$SOURCE_IMG" --out Icon.iconset/icon_256x256.png
          sips -z 512 512   "$SOURCE_IMG" --out Icon.iconset/icon_256x256@2x.png
          sips -z 512 512   "$SOURCE_IMG" --out Icon.iconset/icon_512x512.png
          sips -z 1024 1024 "$SOURCE_IMG" --out Icon.iconset/icon_512x512@2x.png
          
          # Convert iconset to icns
          iconutil -c icns Icon.iconset -o assets/Colosseum.icns
          rm -rf Icon.iconset
          
          echo "Created assets/Colosseum.icns"

      - name: Import Signing Certificate
        if: ${{ env.SIGNING_ENABLED != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: "actions-keychain-pw"
        run: |
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > certificate.p12
          
          # Create new keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          
          # Import certificate
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          
          # Verify
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain
          
          rm certificate.p12

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_PATH="${{ github.workspace }}/JUCE" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build App
        run: cmake --build build --config Release --parallel 4

      - name: Find App Bundle
        id: find_app
        run: |
          # Find the .app bundle
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found!"
            find build -type d -name "*artefacts*"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app: $APP_PATH"
          
          # Show bundle contents
          echo "=== Bundle Contents ==="
          ls -la "$APP_PATH/Contents/"
          ls -la "$APP_PATH/Contents/MacOS/" || true
          ls -la "$APP_PATH/Contents/Resources/" || true

      - name: Create Entitlements File
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.device.audio-input</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "Created entitlements.plist"

      - name: Sign & Notarize
        if: ${{ env.SIGNING_ENABLED != '' }}
        env:
          APP_PATH: ${{ steps.find_app.outputs.APP_PATH }}
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          KEYCHAIN_PASSWORD: "actions-keychain-pw"
        run: |
          # Unlock keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          
          # Find the signing identity
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | grep -o '"[^"]*"' | sed 's/"//g')
          
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application certificate found"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          
          echo "Signing with identity: $IDENTITY"
          echo "App path: $APP_PATH"
          
          # Sign all nested binaries first (frameworks, dylibs)
          find "$APP_PATH" -type f \( -name "*.dylib" -o -perm +111 \) -exec \
            codesign --force --options runtime --sign "$IDENTITY" --timestamp --entitlements entitlements.plist {} \; 2>/dev/null || true
          
          # Sign frameworks
          find "$APP_PATH" -type d -name "*.framework" -exec \
            codesign --force --deep --options runtime --sign "$IDENTITY" --timestamp --entitlements entitlements.plist {} \; 2>/dev/null || true
          
          # Sign the main app bundle
          codesign --force --deep --options runtime --sign "$IDENTITY" --timestamp --entitlements entitlements.plist "$APP_PATH"
          
          # Verify signature
          echo "=== Verifying signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          
          # Check entitlements
          echo "=== Entitlements ==="
          codesign -d --entitlements :- "$APP_PATH"
          
          # Create zip for notarization
          APP_NAME=$(basename "$APP_PATH")
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "Colosseum_Notarization.zip"
          
          # Submit for notarization
          echo "=== Submitting for notarization ==="
          xcrun notarytool submit "Colosseum_Notarization.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          
          # Staple the notarization ticket
          echo "=== Stapling ticket ==="
          xcrun stapler staple "$APP_PATH" || echo "::warning::Stapling failed but continuing"
          
          # Create final signed zip
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "Colosseum_Mac_Signed.zip"
          
          echo "=== Final verification ==="
          spctl --assess --type execute -vv "$APP_PATH" || echo "::warning::spctl check incomplete"

      - name: Package Unsigned App
        if: ${{ env.SIGNING_ENABLED == '' }}
        env:
          APP_PATH: ${{ steps.find_app.outputs.APP_PATH }}
        run: |
          echo "Creating unsigned package from $APP_PATH"
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "Colosseum_Mac_Unsigned.zip"

      - name: Upload Signed App
        if: ${{ env.SIGNING_ENABLED != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Colosseum-Mac-App-Signed
          path: Colosseum_Mac_Signed.zip

      - name: Upload Unsigned App
        if: ${{ env.SIGNING_ENABLED == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Colosseum-Mac-App-Unsigned
          path: Colosseum_Mac_Unsigned.zip
