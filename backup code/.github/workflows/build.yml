name: Build Subterraneum

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  JUCE_VERSION: "8.0.0"

jobs:
  # ===========================================================================
  # WINDOWS BUILD
  # ===========================================================================
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Cache JUCE
      id: cache-juce
      uses: actions/cache@v4
      with:
        path: C:/JUCE
        key: juce-${{ env.JUCE_VERSION }}-windows

    - name: Download JUCE
      if: steps.cache-juce.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-windows.zip" -OutFile "juce.zip"
        Expand-Archive -Path "juce.zip" -DestinationPath "C:/"
        Rename-Item "C:/JUCE-${{ env.JUCE_VERSION }}" "C:/JUCE"

    - name: Cache ASIO SDK
      id: cache-asio
      uses: actions/cache@v4
      with:
        path: C:/ASIOSDK
        key: asio-sdk-2.3.3

    - name: Download ASIO SDK
      if: steps.cache-asio.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        # ASIO SDK must be downloaded from Steinberg - using placeholder
        # In practice, you'd need to host this yourself or download manually
        New-Item -ItemType Directory -Force -Path "C:/ASIOSDK/common"
        Write-Host "Note: ASIO SDK needs manual setup. Build will use WASAPI fallback."

    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DJUCE_PATH="C:/JUCE" `
          -DASIO_SDK_PATH="C:/ASIOSDK" `
          -DAUTO_DOWNLOAD_VST2_SDK=ON `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Prepare artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "artifacts"
        Copy-Item "build/${{ env.BUILD_TYPE }}/SubterraneumApp.exe" -Destination "artifacts/" -ErrorAction SilentlyContinue
        Copy-Item "build/SubterraneumApp_artefacts/${{ env.BUILD_TYPE }}/SubterraneumApp.exe" -Destination "artifacts/" -ErrorAction SilentlyContinue

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subterraneum-Windows-x64
        path: artifacts/
        if-no-files-found: warn

  # ===========================================================================
  # MACOS BUILD (Universal Binary - Intel + Apple Silicon)
  # ===========================================================================
  build-macos:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache JUCE
      id: cache-juce
      uses: actions/cache@v4
      with:
        path: ~/JUCE
        key: juce-${{ env.JUCE_VERSION }}-macos

    - name: Download JUCE
      if: steps.cache-juce.outputs.cache-hit != 'true'
      run: |
        curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-osx.zip" -o juce.zip
        unzip juce.zip -d ~/
        mv ~/JUCE-${{ env.JUCE_VERSION }} ~/JUCE

    - name: Configure CMake (Universal Binary)
      run: |
        cmake -B build -G Xcode \
          -DJUCE_PATH="$HOME/JUCE" \
          -DAUTO_DOWNLOAD_VST2_SDK=ON \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13" \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        # Find and copy the .app bundle
        find build -name "*.app" -type d | head -1 | xargs -I {} cp -R {} artifacts/
        
    - name: Create DMG
      run: |
        if [ -d "artifacts/Subterraneum.app" ] || [ -d "artifacts/SubterraneumApp.app" ]; then
          cd artifacts
          APP_NAME=$(ls -d *.app | head -1)
          hdiutil create -volname "Subterraneum" -srcfolder "$APP_NAME" -ov -format UDZO "../Subterraneum-macOS-Universal.dmg"
          mv ../Subterraneum-macOS-Universal.dmg .
        fi

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subterraneum-macOS-Universal
        path: |
          artifacts/*.app
          artifacts/*.dmg
        if-no-files-found: warn

  # ===========================================================================
  # LINUX BUILD
  # ===========================================================================
  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libasound2-dev \
          libjack-jackd2-dev \
          libfreetype6-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libgl1-mesa-dev \
          libcurl4-openssl-dev \
          libwebkit2gtk-4.0-dev \
          ladspa-sdk

    - name: Cache JUCE
      id: cache-juce
      uses: actions/cache@v4
      with:
        path: ~/JUCE
        key: juce-${{ env.JUCE_VERSION }}-linux

    - name: Download JUCE
      if: steps.cache-juce.outputs.cache-hit != 'true'
      run: |
        curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-linux.zip" -o juce.zip
        unzip juce.zip -d ~/
        mv ~/JUCE-${{ env.JUCE_VERSION }} ~/JUCE

    - name: Configure CMake
      run: |
        cmake -B build \
          -DJUCE_PATH="$HOME/JUCE" \
          -DAUTO_DOWNLOAD_VST2_SDK=ON \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        find build -name "SubterraneumApp" -type f -executable | head -1 | xargs -I {} cp {} artifacts/
        
    - name: Create AppImage (optional)
      run: |
        # Basic artifact packaging - could be enhanced with AppImage
        cd artifacts
        if [ -f "SubterraneumApp" ]; then
          tar -czvf Subterraneum-Linux-x64.tar.gz SubterraneumApp
        fi

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subterraneum-Linux-x64
        path: artifacts/
        if-no-files-found: warn

  # ===========================================================================
  # CREATE RELEASE (on tag push)
  # ===========================================================================
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Display structure
      run: ls -R release-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-artifacts/**/*
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
